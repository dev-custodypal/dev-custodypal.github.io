{% if include.images %}
<div class="mt-4 mb-6 gallery">
  <details class="group">
    <!-- The summary tag is the clickable header -->
    <summary class="flex items-center cursor-pointer list-none">
      <h2 id="gallery">Photo Gallery</h2>
      
      <!-- Plus/Minus sign right next to the title -->
      <span class="ml-3 text-3xl font-light text-gray-500 transition-transform duration-300 group-open:rotate-45">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
</svg>

      </span>
    </summary>

    <!-- The images remain hidden until the summary is clicked -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mt-6 bg-sand border border-gray-200 rounded-2xl p-6 shadow-sm">


 <!-- Images (auto from folder) -->
    {% assign images = site.static_files | where_exp: "file", "file.path contains include.trip" %}
      {% for image in images %}
      <figure class="group/item cursor-pointer">
        <img 
          src="{{ image.path }}" 
          alt="{{ image.caption }}" 
          class="rounded-xl object-cover w-full h-56 transition duration-300 hover:opacity-90" 
          onclick="openLightbox({{ forloop.index0 }})"
        >
        {% if image.caption %}
        <figcaption class="text-sm text-gray-500 mt-2">
          {{ image.caption }}
        </figcaption>
        {% endif %}
      </figure>
      {% endfor %}
    </div>
  </details>
</div>
{% endif %}
